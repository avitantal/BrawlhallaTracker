<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אגוזי הקרב</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0c800;
  --gold2: #e0a800;
  --orange: #f0e020;
  --red: #c0392b;
  --cyan: #40e0c8;
  --cyan2: #20c0b0;
  --dark: #061428;
  --dark2: #0a1e38;
  --dark3: #0e2545;
  --panel: #10204080;
  --panel2: #102040;
  --panel3: #163058;
  --border: #1a4070;
  --border2: #2060a0;
  --text: #e8f4ff;
  --text2: #7ab8d8;
  --text3: #3a7090;
  --place1: #ffd700;
  --place2: #c0c0c0;
  --place3: #cd7f32;
  --place4: #7040c0;
  --glow-gold: 0 0 20px #f0c80060, 0 0 40px #f0c80030;
  --glow-cyan: 0 0 20px #40e0c860, 0 0 40px #40e0c830;
  --glow-red: 0 0 15px #c0392b60;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, #0a3060 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, #061838 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #061428 0%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2340e0c8' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Cyan flame glow orbs - Brawlhalla spirit fire */
body .flame-orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(80px);
  animation: orbPulse 6s ease-in-out infinite;
}
@keyframes orbPulse {
  0%, 100% { opacity: 0.12; transform: scale(1); }
  50% { opacity: 0.22; transform: scale(1.15); }
}

#app { position: relative; z-index: 1; }

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px 20px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--gold), var(--cyan), transparent);
}

.logo-wrap { position: relative; display: inline-block; }

.logo-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(180deg, #fff8c0 0%, #f0c800 35%, #c08000 70%, #704800 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 20px #f0c80080) drop-shadow(0 2px 4px #0008);
  line-height: 1.1;
}

.logo-sub {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.7rem, 2vw, 1rem);
  letter-spacing: 6px;
  color: var(--text2);
  text-transform: uppercase;
  margin-top: 4px;
}

.walnut-deco {
  font-size: 1.8rem;
  margin: 0 12px;
  filter: drop-shadow(0 0 8px #40e0c860);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; }

/* LAYOUT */
.main-layout {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 0;
  max-width: 860px;
  margin: 0 auto;
}

/* Name the three columns for reordering on mobile */
.col-left  { display: flex; flex-direction: column; gap: 0; }
.col-center { }
.col-right  { display: flex; flex-direction: column; gap: 0; }

/* ── MOBILE LAYOUT ── */
@media (max-width: 768px) {

  /* Compact header */
  .header { padding: 16px 12px 14px; }
  .logo-title { font-size: clamp(1.4rem, 8vw, 2.4rem); letter-spacing: 2px; }
  .logo-sub { font-size: 0.55rem; letter-spacing: 3px; }
  .walnut-deco { font-size: 1.2rem; margin: 0 6px; }

  .main-layout {
    grid-template-columns: 1fr;
    gap: 10px;
    padding: 10px;
  }

  /* Reorder: center (game) first, then right (lb), then left (pool+session) */
  .col-left   { order: 3; }
  .col-center { order: 1; }
  .col-right  { order: 2; }

  /* Within col-left: session control first, then pool, then scoring */
  #session-panel-wrap { order: 1; }
  #pool-panel-wrap    { order: 2; }
  #scoring-panel-wrap { order: 3; }

  /* Tighten panels */
  .panel { padding: 12px; border-radius: 10px; }
  .panel-title { font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 10px; }

  /* Game history: shorter on mobile */
  .game-history-list { max-height: 140px; }

  /* Archive: shorter on mobile */
  .archive-list { max-height: 260px; }

  /* Scoring grid: 2 col already, keep */
  .scoring-grid { gap: 8px; }

  /* Fighter pool list: compact */
  .fighter-item { padding: 6px 8px; }
  .fighter-avatar { width: 30px; height: 30px; font-size: 0.9rem; }
  .fighter-name-display { font-size: 0.82rem; }

  /* Placement zone: 2 columns */
  .placement-zone { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .fighter-card { padding: 12px 8px; }
  .fighter-card .fc-avatar { font-size: 1.7rem; }

  /* Leaderboard items: compact */
  .lb-item { padding: 8px 10px; gap: 8px; }
  .lb-avatar { font-size: 1.3rem; }
  .lb-nuts-count { font-size: 0.95rem; }

  /* Btn row: wrap nicely */
  .game-btn-row { gap: 8px; }
  .btn { padding: 9px 16px; font-size: 0.85rem; }

  /* Game fighter select grid: wrap tighter */
  .game-fighter-select-grid { gap: 6px; }
  .gfs-card { padding: 6px 10px; font-size: 0.8rem; }

  /* Archive wrapper padding */
  .archive-wrap { padding: 0 10px 20px; }

  /* Collapsible scoring on mobile */
  .scoring-collapse-toggle {
    display: flex;
  }
}

@media (min-width: 769px) {
  .scoring-collapse-toggle { display: none !important; }
  .scoring-collapse-body { display: block !important; }
  .col-left   { order: unset; }
  .col-center { order: unset; }
  .col-right  { order: unset; }
}

/* Collapsible panel toggle */
.scoring-collapse-toggle {
  display: none;
  width: 100%;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 0.75rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
  cursor: pointer;
  padding: 6px 0 0;
  text-align: center;
  gap: 6px;
  align-items: center;
  justify-content: center;
}
.scoring-collapse-toggle:hover { color: var(--cyan); }
.scoring-collapse-body { transition: all 0.2s; }

/* PANELS */
.panel {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 16px;
  position: relative;
  overflow: hidden;
  border-bottom: none;
}
.panel:last-child,
.panel-last {
  border-bottom: 1px solid var(--border);
}
.panel:first-child {
  border-radius: 12px 12px 0 0;
}
.main-layout > .panel:last-child,
.col-left > .panel:last-child,
.col-right > .panel:last-child {
  border-bottom: 1px solid var(--border);
  border-radius: 0 0 12px 12px;
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan2), transparent);
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.15s;
}

.btn:hover::after { opacity: 0.08; }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, #c08000, #f0c800);
  color: #0a1e38;
  box-shadow: 0 4px 15px #f0c80040, inset 0 1px 0 #fff8;
}

.btn-primary:hover {
  box-shadow: 0 6px 25px #f0c80060, inset 0 1px 0 #fff8;
  transform: translateY(-1px);
}

.btn-danger {
  background: linear-gradient(135deg, #1a0040, #c0392b);
  color: #fff;
  box-shadow: 0 4px 12px #c0392b40;
}

.btn-danger:hover { box-shadow: 0 6px 20px #c0392b60; transform: translateY(-1px); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-ghost:hover { border-color: var(--gold2); color: var(--gold); }

.btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }

.btn-success {
  background: linear-gradient(135deg, #0a6060, #20c0b0);
  color: #fff;
  box-shadow: 0 4px 12px #20c0b040;
}

/* INPUTS */
input[type="text"], input[type="number"] {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.9rem;
  width: 100%;
  transition: border-color 0.2s;
}

input:focus {
  outline: none;
  border-color: var(--cyan2);
  box-shadow: 0 0 0 2px #40e0c820;
}

/* FIGHTER POOL */
.fighter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--dark3);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  transition: border-color 0.2s;
}

.fighter-item:hover { border-color: var(--border2); }

.fighter-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--border2), var(--dark3));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
}
.fighter-avatar:hover {
  border-color: var(--cyan);
  transform: scale(1.15);
}

/* EMOJI PICKER */
.emoji-picker-overlay {
  position: fixed;
  inset: 0;
  background: #0007;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.emoji-picker-modal {
  background: var(--panel2);
  border: 2px solid var(--cyan2);
  border-radius: 16px;
  padding: 20px;
  width: min(420px, 95vw);
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--glow-cyan), 0 20px 60px #000a;
}
.emoji-picker-title {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  color: var(--gold);
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 14px;
}
.emoji-category-label {
  font-size: 0.7rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
  color: var(--text3);
  margin: 10px 0 6px;
  text-transform: uppercase;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}
.emoji-btn {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: var(--dark3);
  font-size: 1.4rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  line-height: 1;
}
.emoji-btn:hover {
  background: var(--border2);
  border-color: var(--cyan);
  transform: scale(1.2);
}
.emoji-btn.selected {
  border-color: var(--cyan);
  background: #40e0c820;
  box-shadow: 0 0 8px #40e0c840;
}
.emoji-picker-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.fighter-name-display {
  font-weight: 600;
  font-size: 0.9rem;
  flex: 1;
  color: var(--text);
}

.fighter-actions { display: flex; gap: 4px; }

.icon-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  transition: all 0.15s;
}

.icon-btn:hover { background: var(--border); color: var(--text); }
.icon-btn.del:hover { background: #c0392b30; color: #e74c3c; }

.add-fighter-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

/* SESSION START - FIGHTER SELECT */
.session-select-overlay {
  position: fixed;
  inset: 0;
  background: #061428ee;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.session-select-modal {
  background: var(--panel2);
  border: 2px solid var(--cyan2);
  border-radius: 16px;
  padding: 30px;
  width: min(600px, 95vw);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--glow-cyan), 0 20px 60px #0008;
}

.modal-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.4rem;
  color: var(--gold);
  text-align: center;
  margin-bottom: 20px;
}

.fighter-select-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.fighter-select-card {
  padding: 14px 10px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--dark3);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  user-select: none;
}

.fighter-select-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.fighter-select-card.selected {
  border-color: var(--cyan);
  background: #40e0c815;
  box-shadow: 0 0 12px #40e0c830;
}

.fighter-select-card .card-avatar {
  font-size: 2rem;
  margin-bottom: 6px;
}

.fighter-select-card .card-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}

/* GAME PANEL */
.game-panel { }

.session-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}

.session-badge {
  font-size: 0.75rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  background: #40e0c820;
  border: 1px solid #40e0c860;
  color: var(--cyan);
}

.session-time {
  font-size: 0.75rem;
  color: var(--text3);
  font-family: 'Cinzel', serif;
}

.game-number-tag {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  color: var(--text2);
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

/* PLACEMENT ZONE */
.placement-zone {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.fighter-card {
  padding: 16px 12px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--dark3);
  cursor: pointer;
  text-align: center;
  transition: all 0.25s;
  position: relative;
  user-select: none;
}

.fighter-card:hover:not(.placed) {
  border-color: var(--border2);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px #0006;
}

.fighter-card.placed { cursor: default; }

.fighter-card .card-place-badge {
  position: absolute;
  top: -10px;
  right: -10px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.85rem;
  font-family: 'Cinzel', serif;
}

.place-1 { background: var(--place1); color: #000; border: 2px solid #fff8; }
.place-2 { background: var(--place2); color: #000; border: 2px solid #fff6; }
.place-3 { background: var(--place3); color: #fff; border: 2px solid #fff4; }
.place-4 { background: var(--place4); color: #fff; border: 2px solid #fff4; }

.card-place-1 { border-color: var(--place1); background: #ffd70012; box-shadow: 0 0 20px #ffd70040; }
.card-place-2 { border-color: var(--place2); background: #c0c0c010; }
.card-place-3 { border-color: var(--place3); background: #cd7f3210; }
.card-place-4 { border-color: var(--place4); background: #7040c010; }

.fighter-card .fc-avatar {
  font-size: 2.2rem;
  margin-bottom: 8px;
  display: block;
}

.fighter-card .fc-name {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text);
}

.fighter-card .fc-pts {
  font-size: 0.75rem;
  color: var(--text3);
  margin-top: 4px;
}

.placement-label {
  font-size: 0.7rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
  margin-top: 4px;
}

.place-label-1 { color: var(--place1); }
.place-label-2 { color: var(--place2); }
.place-label-3 { color: var(--place3); }
.place-label-4 { color: var(--place4); }

/* FIRST HIT TITLE */
.fighter-card.first-hit {
  border-color: #ff5ac8;
  background:
    radial-gradient(circle at 18% 18%, #ff8cda35 0%, transparent 34%),
    linear-gradient(135deg, #ff5ac820, #40103480);
  box-shadow: 0 0 24px #ff5ac860, inset 0 0 18px #ff9adc18;
}

.fighter-card.first-hit::before,
.fighter-card.first-hit::after {
  content: '♥';
  position: absolute;
  color: #ff8cda;
  text-shadow: 0 0 10px #ff5ac8;
  font-size: 1rem;
  pointer-events: none;
}

.fighter-card.first-hit::before {
  top: 10px;
  left: 12px;
}

.fighter-card.first-hit::after {
  right: 12px;
  bottom: 10px;
}

.first-hit-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-top: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid #ff8cda80;
  background: #ff5ac820;
  color: #ffb8e8;
  font-size: 0.68rem;
  font-weight: 800;
}

.first-hit-section {
  margin: 2px 0 16px;
  padding: 12px;
  border: 1px solid #ff5ac860;
  border-radius: 10px;
  background: #ff5ac812;
  text-align: center;
}

.first-hit-title {
  color: #ffb8e8;
  font-size: 0.82rem;
  font-weight: 800;
  margin-bottom: 10px;
}

.first-hit-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.first-hit-option,
.first-hit-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border-radius: 999px;
  border: 1px solid #ff5ac870;
  background: #ff5ac818;
  color: #ffb8e8;
  font-weight: 700;
}

.first-hit-option {
  min-height: 34px;
  padding: 6px 12px;
  cursor: pointer;
  font-family: inherit;
}

.first-hit-option:hover,
.first-hit-option.selected {
  background: #ff5ac838;
  border-color: #ffb8e8;
  box-shadow: 0 0 16px #ff5ac860;
}

.first-hit-option.selected::before,
.first-hit-option.selected::after,
.first-hit-chip::before,
.first-hit-chip::after {
  content: '♥';
  color: #ff8cda;
}

.first-hit-chip {
  padding: 3px 8px;
  font-size: 0.75rem;
}

.save-requirement {
  color: #ffb8e8;
  font-size: 0.78rem;
  font-weight: 700;
  text-align: center;
}

/* GAME HISTORY */
.game-history-list { max-height: 200px; overflow-y: auto; }

.game-hist-item {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  font-size: 0.82rem;
}

.game-hist-item .gh-header {
  display: flex;
  justify-content: space-between;
  color: var(--text2);
  margin-bottom: 6px;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
}

.game-hist-placements { display: flex; gap: 6px; flex-wrap: wrap; }

.place-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}

.chip-1 { background: #ffd70025; border: 1px solid #ffd70060; color: var(--place1); }
.chip-2 { background: #c0c0c015; border: 1px solid #c0c0c050; color: var(--place2); }
.chip-3 { background: #cd7f3215; border: 1px solid #cd7f3250; color: var(--place3); }
.chip-4 { background: #7040c015; border: 1px solid #7040c050; color: var(--place4); }

/* LEADERBOARD */
.leaderboard { display: flex; flex-direction: column; gap: 8px; }

.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 10px;
  background: var(--dark3);
  border: 1px solid var(--border);
  position: relative;
  transition: all 0.2s;
}

.lb-item:hover { border-color: var(--border2); }

.lb-rank {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.1rem;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}

.lb-avatar {
  font-size: 1.6rem;
  flex-shrink: 0;
}

.lb-info { flex: 1; min-width: 0; }

.lb-name {
  font-weight: 700;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lb-title-tag {
  font-size: 0.68rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  margin-top: 2px;
}

.lb-nuts {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}

.lb-nuts-count {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.1rem;
}

.lb-walnut {
  font-size: 1.3rem;
  filter: drop-shadow(0 0 4px #f0c80080);
}

/* First place special */
.lb-first {
  border: 1px solid #f0c80060;
  background: linear-gradient(135deg, #f0c80008, var(--dark3));
  box-shadow: 0 0 15px #f0c80020;
}

.lb-first .lb-rank { color: var(--place1); filter: drop-shadow(0 0 4px #ffd70080); }
.lb-first .lb-nuts-count { color: var(--place1); }
.lb-first .lb-title-tag { color: var(--place1); }

/* Last place */
.lb-last {
  border: 1px solid #7040c050;
  background: linear-gradient(135deg, #7040c008, var(--dark3));
}

.lb-last .lb-rank { color: var(--place4); }
.lb-last .lb-title-tag { color: var(--place4); }

/* SCORING SETTINGS */
.scoring-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.scoring-item {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.scoring-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}

.place-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* SESSION CONTROL */
.session-control { display: flex; flex-direction: column; gap: 10px; }

.no-session-msg {
  text-align: center;
  padding: 20px;
  color: var(--text3);
  font-size: 0.85rem;
}

/* ARCHIVED SESSIONS */
.archive-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

.archive-item {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.archive-item:hover { border-color: var(--border2); }

.archive-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.archive-num {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  color: var(--gold);
  font-weight: 700;
}

.archive-time {
  font-size: 0.7rem;
  color: var(--text3);
}

.archive-stats {
  display: flex;
  gap: 12px;
  font-size: 0.78rem;
  color: var(--text2);
}

.archive-winner {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--gold);
  font-weight: 600;
}

.archive-detail {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: none;
}

.archive-detail.open { display: block; }

/* SCROLL */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--dark2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* OVERLAYS & MODALS */
.hidden { display: none !important; }

/* NO SESSION FULL PANEL */
.no-session-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  gap: 16px;
}

.no-session-panel .big-walnut {
  font-size: 4rem;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px #40e0c860);
}

.no-session-panel h3 {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  color: var(--text2);
}

/* GAME SELECT OVERLAY */
.game-fighter-select {
  background: var(--dark3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 16px;
}

.game-fighter-select-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.gfs-card {
  padding: 8px 14px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--dark2);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.gfs-card:hover { border-color: var(--border2); }
.gfs-card.gfs-selected { border-color: var(--cyan); color: var(--cyan); background: #40e0c810; }

/* TOAST */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  padding: 10px 22px;
  border-radius: 30px;
  background: var(--cyan2);
  color: #061428;
  font-weight: 700;
  font-size: 0.9rem;
  box-shadow: 0 4px 20px #0006, var(--glow-cyan);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  white-space: nowrap;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to { opacity: 0; transform: translateY(-10px) scale(0.9); }
}

/* TABS */
.tab-nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px 0;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.tab-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 10px 28px;
  border-radius: 10px 10px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  background: var(--dark3);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  bottom: -1px;
}

.tab-btn:hover { color: var(--text); background: var(--panel3); }

.tab-btn.active {
  background: var(--panel2);
  color: var(--gold);
  border-color: var(--border2);
  border-bottom: 1px solid var(--panel2);
}

.tab-page { display: none; }
.tab-page.active { display: block; }

/* tab underline separator */
.tab-nav-line {
  height: 1px;
  background: var(--border2);
  max-width: 1400px;
  margin: 0 auto;
}
.tab-page .main-layout {
  margin: 20px auto 30px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.tab-page .main-layout .panel {
  border-left: none;
  border-right: none;
  border-top: none;
  border-radius: 0;
}
.tab-page .main-layout .panel:first-child {
  border-top: none;
}
.tab-page .main-layout .panel.panel-last,
.tab-page .main-layout .panel:last-child {
  border-bottom: none;
}

/* No top padding on main-layout inside a tab */

/* DIVIDER */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin: 14px 0;
}

/* GAME BUTTONS ROW */
.game-btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

/* PULSING RING for next placement */
.next-place-hint {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text3);
  font-style: italic;
  margin-bottom: 10px;
}

.fighter-card.available:hover {
  box-shadow: 0 0 15px #40e0c830;
}

/* FIGHTER SELECT CHECK */
.fs-check {
  display: inline-block;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all 0.15s;
}

.gfs-selected .fs-check {
  background: var(--gold);
  border-color: var(--gold);
}

/* SECTION LABELS */
.section-label {
  font-size: 0.7rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 3px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ANIMATIONS */
@keyframes pulse-gold {
  0%, 100% { box-shadow: 0 0 0 0 #40e0c840; }
  50% { box-shadow: 0 0 0 8px #40e0c800; }
}

.pulse-available { animation: pulse-gold 2s infinite; }

@keyframes pulse-mode {
  0%   { transform: scale(0.94); opacity: 0.7; }
  50%  { transform: scale(1.04); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* CONFIRM MODAL */
.confirm-modal-bg {
  position: fixed;
  inset: 0;
  background: #0009;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.confirm-modal {
  background: var(--panel2);
  border: 2px solid var(--cyan2);
  border-radius: 14px;
  padding: 28px 32px;
  width: min(360px, 90vw);
  text-align: center;
  box-shadow: var(--glow-cyan), 0 20px 60px #000a;
}

.confirm-modal h3 {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  margin-bottom: 10px;
  font-size: 1.1rem;
}

.confirm-modal p {
  color: var(--text2);
  font-size: 0.88rem;
  margin-bottom: 20px;
}

.confirm-modal .btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* WALNUT SVG */
.walnut-svg {
  display: inline-block;
  width: 22px;
  height: 22px;
  vertical-align: middle;
}

/* Walnut icon base */
.walnut-icon {
  display: inline-block;
  width: 1.2em;
  height: 1.2em;
  vertical-align: middle;
  flex-shrink: 0;
}

/* Walnut in header deco spans */
.walnut-deco .walnut-icon {
  width: 2rem;
  height: 2rem;
  filter: drop-shadow(0 0 8px #40e0c860);
}

/* Big walnut in no-session panel */
.big-walnut .walnut-icon {
  width: 5rem;
  height: 5rem;
}

/* Walnut in leaderboard */
.lb-walnut .walnut-icon {
  width: 1.4rem;
  height: 1.4rem;
  filter: drop-shadow(0 0 4px #f0c80080);
}

/* Walnut in scoring label */
.scoring-label .walnut-icon {
  width: 1rem;
  height: 1rem;
}

/* Walnut in fighter card pts */
.fc-pts .walnut-icon {
  width: 0.9rem;
  height: 0.9rem;
}

/* Walnut in archive winner */
.archive-winner .walnut-icon {
  width: 1rem;
  height: 1rem;
}

/* Walnut in archive detail scores */
.archive-detail .walnut-icon {
  width: 0.9rem;
  height: 0.9rem;
}

/* Walnut in panel title */
.panel-title .walnut-icon {
  width: 1.1rem;
  height: 1.1rem;
}

/* Walnut in modal title */
.modal-title .walnut-icon {
  width: 1.3rem;
  height: 1.3rem;
}

/* Walnut in toast (inline in strings) */
.toast .walnut-icon {
  width: 1rem;
  height: 1rem;
}
</style>

// ==================== STATE ====================
let state = {
  fighters: [],
  sessions: [],
  activeSessionId: null,
  archive: [],
  scoring: { 1: 10, 2: 6, 3: 3, 4: 1 },
  editingFighter: null
};

Object.defineProperty(state, 'session', {
  get() { return this.sessions.find(s => s.id === this.activeSessionId) || null; }
});

function ensureSessionDefaults(s) {
  if (!s) return s;
  if (!s.currentPlacements) s.currentPlacements = {};
  if (typeof s.currentGameStarted !== 'boolean') s.currentGameStarted = false;
  if (typeof s.currentFirstHitId === 'undefined') s.currentFirstHitId = null;
  if (!Array.isArray(s.currentGameFighters)) s.currentGameFighters = [...s.fighters];
  if (typeof s.interactiveMode !== 'boolean') s.interactiveMode = false;
  if (!s.currentMode) s.currentMode = 'normal';
  if (typeof s.currentHuntedId === 'undefined') s.currentHuntedId = null;
  if (!s.currentKnockouts) s.currentKnockouts = {};
  return s;
}

// ==================== PERSISTENCE ====================
function save() {
  localStorage.setItem('brawl_fighters', JSON.stringify(state.fighters));
  localStorage.setItem('brawl_sessions', JSON.stringify(state.sessions));
  localStorage.setItem('brawl_active_session_id', JSON.stringify(state.activeSessionId));
  localStorage.setItem('brawl_archive', JSON.stringify(state.archive));
  localStorage.setItem('brawl_scoring', JSON.stringify(state.scoring));
}

function load() {
  try {
    state.fighters = JSON.parse(localStorage.getItem('brawl_fighters') || '[]');
    state.sessions = JSON.parse(localStorage.getItem('brawl_sessions') || '[]');
    state.activeSessionId = JSON.parse(localStorage.getItem('brawl_active_session_id') || 'null');
    // Migrate legacy single-session storage
    const legacy = JSON.parse(localStorage.getItem('brawl_session') || 'null');
    if (legacy && !state.sessions.find(s => s.id === legacy.id)) {
      state.sessions.push(legacy);
      if (!state.activeSessionId) state.activeSessionId = legacy.id;
      localStorage.removeItem('brawl_session');
    }
    state.sessions.forEach(ensureSessionDefaults);
    if (state.activeSessionId && !state.sessions.find(s => s.id === state.activeSessionId)) {
      state.activeSessionId = state.sessions[0]?.id || null;
    }
    state.archive = JSON.parse(localStorage.getItem('brawl_archive') || '[]');
    const sc = JSON.parse(localStorage.getItem('brawl_scoring') || 'null');
    if (sc) state.scoring = sc;
  } catch(e) {}
}

function switchSession(id) {
  if (!state.sessions.find(s => s.id === id)) return;
  state.activeSessionId = id;
  save();
  renderAll();
}

const AVATARS = ['🐺','🦁','🐯','🦊','🐻','🦅','🐉','🦂','🦈','🦇','🐲','🐗','🦝','🐊','🦖'];
function getAvatar(fighter) {
  // Support both fighter object (with emoji) and plain name string (legacy)
  if (typeof fighter === 'object' && fighter !== null) {
    if (fighter.emoji) return fighter.emoji;
    fighter = fighter.name;
  }
  let hash = 0;
  for (let c of fighter) hash += c.charCodeAt(0);
  return AVATARS[hash % AVATARS.length];
}

let emojiPickerFighterId = null;

function openEmojiPicker(fid) {
  emojiPickerFighterId = fid;
  const f = state.fighters.find(x => x.id === fid);
  emojiPickerSelected = f ? (f.emoji || getAvatar(f)) : null;

  const container = document.getElementById('emoji-grid-container');
  container.innerHTML = EMOJI_CATEGORIES.map(cat => `
    <div class="emoji-category-label">${cat.label}</div>
    <div class="emoji-grid">
      ${cat.emojis.map(e => `
        <button class="emoji-btn ${e === emojiPickerSelected ? 'selected' : ''}"
          onclick="selectEmoji('${e}')" title="${e}">${e}</button>
      `).join('')}
    </div>
  `).join('');

  document.getElementById('emoji-picker-overlay').classList.remove('hidden');
}

function selectEmoji(emoji) {
  emojiPickerSelected = emoji;
  document.querySelectorAll('.emoji-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === emoji);
  });
}

function confirmEmojiPick() {
  if (!emojiPickerFighterId || !emojiPickerSelected) { closeEmojiPicker(); return; }
  const f = state.fighters.find(x => x.id === emojiPickerFighterId);
  if (f) {
    f.emoji = emojiPickerSelected;
    // Also update in active session fighters if present
    if (state.session) {
      const sf = state.session.fighters.find(x => x.id === f.id);
      if (sf) sf.emoji = f.emoji;
    }
    save();
    renderAll();
    toast(`אמוג'י עודכן! ${emojiPickerSelected}`);
  }
  closeEmojiPicker();
}

function closeEmojiPicker() {
  document.getElementById('emoji-picker-overlay').classList.add('hidden');
  emojiPickerFighterId = null;
  emojiPickerSelected = null;
}

  return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('he-IL');
}

// ==================== FIGHTERS ====================
function addFighter() {
  const inp = document.getElementById('new-fighter-input');
  const name = inp.value.trim();
  if (!name) return;
  if (state.fighters.find(f => f.name === name)) { toast('לוחם זה כבר קיים!'); return; }
  let hash = 0;
  for (let c of name) hash += c.charCodeAt(0);
  const emoji = AVATARS[hash % AVATARS.length];
  state.fighters.push({ id: Date.now(), name, emoji });
  inp.value = '';
  save();
  renderAll();
}

document.getElementById('new-fighter-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFighter();
});

function deleteFighter(id) {
  confirm2('מחק לוחם', 'האם אתה בטוח שברצונך למחוק את הלוחם?', () => {
    state.fighters = state.fighters.filter(f => f.id !== id);
    save();
    renderAll();
    toast('לוחם הוסר');
  });
}

function startEditFighter(id) {
  const f = state.fighters.find(f => f.id === id);
  if (!f) return;
  const el = document.querySelector(`.fighter-item[data-id="${id}"] .fighter-name-display`);
  if (!el) return;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = f.name;
  inp.style.flex = '1';
  el.replaceWith(inp);
  inp.focus();
  inp.select();
  inp.addEventListener('blur', () => finishEdit(id, inp.value));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.value = f.name; inp.blur(); } });
}

function finishEdit(id, name) {
  name = name.trim();
  if (!name) { renderAll(); return; }
  const f = state.fighters.find(f => f.id === id);
  if (f) { f.name = name; save(); }
  renderAll();
}

// ==================== RENDER FIGHTER POOL ====================
function renderFighterPool() {
  const el = document.getElementById('fighter-pool-list');
  if (!state.fighters.length) {
    el.innerHTML = `<div class="no-session-msg">אין לוחמים עדיין. הוסף לוחמים!</div>`;
    return;
  }
  el.innerHTML = state.fighters.map(f => `
    <div class="fighter-item" data-id="${f.id}">
      <div class="fighter-avatar" onclick="openEmojiPicker(${f.id})" title="שנה אמוג'י">${getAvatar(f)}</div>
      <div class="fighter-name-display">${f.name}</div>
      <div class="fighter-actions">
        <button class="icon-btn" onclick="startEditFighter(${f.id})" title="ערוך">✏️</button>
        <button class="icon-btn del" onclick="deleteFighter(${f.id})" title="מחק">🗑️</button>
      </div>
    </div>
  `).join('');
}

function renderScoring() {
  const el = document.getElementById('scoring-grid');
  const places = [
    { n: 1, label: '1st', color: '#ffd700' },
    { n: 2, label: '2nd', color: '#c0c0c0' },
    { n: 3, label: '3rd', color: '#cd7f32' },
    { n: 4, label: '4th', color: '#7040c0' },
  ];
  el.innerHTML = places.map(p => `
    <div class="scoring-item">
      <div class="scoring-label">
        <div class="place-dot" style="background:${p.color}"></div>
        מקום ${p.n} ${W}
      </div>
      <input type="number" min="0" id="score-${p.n}" value="${state.scoring[p.n]}" style="text-align:center;font-weight:700;color:${p.color}" />
    </div>
  `).join('');
}

function saveScoring() {
  [1,2,3,4].forEach(n => {
    const v = parseInt(document.getElementById(`score-${n}`)?.value || 0);
    state.scoring[n] = isNaN(v) ? 0 : v;
  });
  save();
  toast('הגדרות האגוזים נשמרו! ${W}');
}

// ==================== GAME MODES ====================
const GAME_MODES = {
  normal:     { id:'normal',     emoji:'⚔️', name:'משחק רגיל',         desc:'מערכת ניקוד רגילה לפי דירוג סיום.',                            color:'#40e0c8' },
  palestine:  { id:'palestine',  emoji:'🇵🇸', name:'Welcome to Palestine', desc:'נקודת בונוס לכל נוקאאוט של ההומו (מי שהוכה ראשון).',          color:'#ff5ac8' },
  hunted:     { id:'hunted',     emoji:'🎯', name:'Hunted',             desc:'לוחם רנדומלי הוכרז כניצוד — נקודת בונוס לכל נוקאאוט שלו.',  color:'#ffb84d' },
  kingslayer: { id:'kingslayer', emoji:'👑', name:'Kingslayer',          desc:'נקודת בונוס לכל נוקאאוט של מוביל הסשן.',                       color:'#ffd700' },
  underdog:   { id:'underdog',   emoji:'💀', name:'Underdog Rage',       desc:'המקום האחרון בסשן מקבל נקודת בונוס לכל נוקאאוט שלו.',         color:'#7a4dff' },
};
const SPECIAL_MODE_IDS = ['palestine','hunted','kingslayer','underdog'];

function modeRequiresKnockouts(modeId) {
  return SPECIAL_MODE_IDS.includes(modeId);
}

function getSessionLeaderId(sess) {
  let leader = null;
  let max = -1;
  sess.fighters.forEach(f => {
    const s = sess.scores[f.id] || 0;
    if (s > max) { max = s; leader = f.id; }
  });
  return leader;
}
function getSessionLastId(sess) {
  let last = null;
  let min = Infinity;
  sess.fighters.forEach(f => {
    const s = sess.scores[f.id] || 0;
    if (s < min) { min = s; last = f.id; }
  });
  return last;
}

// Returns { [fid]: bonusPoints } given a saved game record
function computeModeBonus(sess, game) {
  const bonus = {};
  const ko = game.knockouts || {};
  if (game.mode === 'palestine' && game.firstHitId) {
    const homoKO = ko[game.firstHitId] || 0;
    sess.fighters.forEach(f => { bonus[f.id] = homoKO; });
    bonus[game.firstHitId] = 0;
  } else if (game.mode === 'hunted' && game.huntedId) {
    const huntedKO = ko[game.huntedId] || 0;
    sess.fighters.forEach(f => { bonus[f.id] = huntedKO; });
    bonus[game.huntedId] = 0;
  } else if (game.mode === 'kingslayer' && game.leaderId) {
    const leaderKO = ko[game.leaderId] || 0;
    sess.fighters.forEach(f => { bonus[f.id] = leaderKO; });
    bonus[game.leaderId] = 0;
  } else if (game.mode === 'underdog' && game.lastId) {
    bonus[game.lastId] = ko[game.lastId] || 0;
  }
  return bonus;
}

// ==================== MODE ROLL ====================
let rollInProgress = false;
function rollNextMode() {
  const sess = state.session;
  if (!sess || rollInProgress) return;
  if (sess.currentGameStarted) { toast('המשחק כבר התחיל'); return; }
  rollInProgress = true;
  const targets = [...SPECIAL_MODE_IDS, 'normal'];
  const finalMode = targets[Math.floor(Math.random() * targets.length)];
  const cycle = ['normal', ...SPECIAL_MODE_IDS];

  const el = document.getElementById('mode-display');
  if (!el) { rollInProgress = false; return; }

  const totalDuration = 1800;
  const start = performance.now();
  let i = 0;
  const tick = () => {
    const elapsed = performance.now() - start;
    const t = Math.min(1, elapsed / totalDuration);
    // ease-out: slow at end
    const interval = 60 + 240 * t * t;
    const m = GAME_MODES[cycle[i % cycle.length]];
    el.innerHTML = `
      <div style="padding:12px;border-radius:10px;border:2px dashed ${m.color};background:${m.color}15;text-align:center;animation:pulse-mode 0.3s;">
        <div style="font-size:1.6rem;">${m.emoji}</div>
        <div style="font-size:0.9rem;font-weight:700;color:${m.color};">${m.name}</div>
        <div style="font-size:0.7rem;color:var(--text3);margin-top:4px;">🎲 מגרילים מוד...</div>
      </div>
    `;
    i++;
    if (elapsed < totalDuration) {
      setTimeout(tick, interval);
    } else {
      // settle on final mode
      sess.currentMode = finalMode;
      sess.currentHuntedId = null;
      sess.currentKnockouts = {};
      if (finalMode === 'hunted') {
        const fs = sess.fighters;
        sess.currentHuntedId = fs[Math.floor(Math.random() * fs.length)].id;
      }
      const fm = GAME_MODES[finalMode];
      el.innerHTML = `
        <div style="padding:14px;border-radius:10px;border:2px solid ${fm.color};background:${fm.color}25;text-align:center;box-shadow:0 0 20px ${fm.color}60;">
          <div style="font-size:0.7rem;color:var(--text3);margin-bottom:4px;">🎉 המוד הוגרל!</div>
          <div style="font-size:2rem;">${fm.emoji}</div>
          <div style="font-size:1.05rem;font-weight:700;color:${fm.color};">${fm.name}</div>
          <div style="font-size:0.75rem;color:var(--text);margin-top:6px;">${fm.desc}</div>
          ${finalMode === 'hunted' && sess.currentHuntedId ? `
            <div style="margin-top:8px;font-size:0.85rem;font-weight:700;color:#ffb84d;">
              🎯 הניצוד: ${getAvatar(sess.fighters.find(f => f.id === sess.currentHuntedId))} ${sess.fighters.find(f => f.id === sess.currentHuntedId).name}
            </div>
          ` : ''}
        </div>
      `;
      rollInProgress = false;
      save();
      // Re-render leaderboard so start button refreshes etc.
      renderLeaderboard();
    }
  };
  tick();
}

function setKnockoutCount(fid, val) {
  const sess = state.session;
  if (!sess) return;
  if (!sess.currentKnockouts) sess.currentKnockouts = {};
  const n = Math.max(0, parseInt(val) || 0);
  sess.currentKnockouts[fid] = n;
  save();
}

function toggleInteractiveMode() {
  const sess = state.session;
  if (!sess) return;
  sess.interactiveMode = !sess.interactiveMode;
  if (!sess.interactiveMode) {
    sess.currentMode = 'normal';
    sess.currentHuntedId = null;
  }
  save();
  renderAll();
}

// ==================== HOMO CANDLE CHART ====================
function homoCandleChart(fighters, counts) {
  const data = fighters.map(f => ({ f, c: counts[f.id] || 0 }))
    .filter(d => d.c > 0)
    .sort((a, b) => b.c - a.c);
  if (!data.length) return '';
  const max = Math.max(...data.map(d => d.c));
  const barW = 18, gap = 6, h = 70, pad = 14;
  const w = data.length * (barW + gap) + gap;
  const bars = data.map((d, i) => {
    const x = gap + i * (barW + gap);
    const bh = Math.max(4, Math.round((d.c / max) * (h - pad)));
    const y = h - bh;
    return `
      <g>
        <title>${d.f.name}: ${d.c}</title>
        <rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3"
          fill="#ff5ac8" stroke="#ff5ac8" stroke-width="1" opacity="0.85"/>
        <line x1="${x + barW/2}" y1="${y - 4}" x2="${x + barW/2}" y2="${y}" stroke="#ff5ac8" stroke-width="1.5"/>
        <text x="${x + barW/2}" y="${y - 6}" text-anchor="middle" font-size="9" fill="#ffb8e8" font-weight="700">${d.c}</text>
        <text x="${x + barW/2}" y="${h - 2}" text-anchor="middle" font-size="11">${getAvatar(d.f)}</text>
      </g>
    `;
  }).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="flex-shrink:0;">${bars}</svg>`;
}

// ==================== SESSION CONTROL ====================
function renderSessionControl() {

  const endPanel = document.getElementById('session-end-panel');
  const endArea = document.getElementById('session-end-area');

  const legend = state.sessions.length > 1 ? `

      <span style="color:#fff;">⚪ לא פעיל</span>

  const sessionsList = state.sessions.length ? `
    ${legend}
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
      ${state.sessions.map(s => {
        const isActive = s.id === state.activeSessionId;
        const fightersPreview = s.fighters.map(f => getAvatar(f)).join('');
        const namesList = s.fighters.map(f => f.name).join(', ');
        const tip = `סשן ${fmtTime(s.startTime)} · ${s.games.length} משחקים\nמשתתפים: ${namesList}`;

                   background:${isActive ? '#40e0c820' : 'transparent'};
                   border:1px solid ${isActive ? '#40e0c860' : 'var(--border)'};
                   color:${isActive ? 'var(--cyan)' : '#fff'};">
            <span>${isActive ? '🟢' : '⚪'}</span>
            <span style="letter-spacing:1px;word-break:break-all;">${fightersPreview}</span>
            <span style="opacity:0.7;white-space:nowrap;">${s.games.length}🎮</span>
          </span>
        `;
      }).join('')}
    </div>
  ` : '';

  const startBtn = `<button class="btn btn-primary btn-sm" onclick="openSessionOverlay()">🎮 התחל סשן חדש</button>`;
  const actionsEl = document.getElementById('session-control-actions');
  if (actionsEl) actionsEl.innerHTML = startBtn;

  if (!state.session) {
    el.innerHTML = `
      <div class="session-control">
        ${state.sessions.length ? sessionsList : '<div class="no-session-msg">לא קיים סשן פעיל כרגע</div>'}
      </div>
    `;
    if (endPanel && endArea) {
      endPanel.classList.add('hidden');
      endArea.innerHTML = '';
    }
    return;
  }

  const sess = state.session;
  const games = sess.games.length;
  const start = fmtTime(sess.startTime);

  const firstHitCounts = {};
  sess.games.forEach(g => {
    if (g.firstHitId) firstHitCounts[g.firstHitId] = (firstHitCounts[g.firstHitId] || 0) + 1;
  });
  let maxHits = 0;
  Object.values(firstHitCounts).forEach(c => { if (c > maxHits) maxHits = c; });
  const topHomos = sess.fighters.filter(f => firstHitCounts[f.id] === maxHits && maxHits > 0);

  let homoBadge = '';
  if (topHomos.length > 0) {
    const chart = homoCandleChart(sess.fighters, firstHitCounts);
    homoBadge = `
      <div style="margin-top:10px; padding:10px; border:1px solid #ff5ac860; border-radius:8px; background:#ff5ac815; display:flex; align-items:center; gap:10px;">
        <div style="font-size:1.8rem; filter:drop-shadow(0 0 6px #ff5ac8)">💖</div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:0.75rem; color:#ffb8e8; font-weight:bold; font-family:'Cinzel', serif;">הומו ההומאים הנוכחי</div>
          <div style="font-size:0.9rem; font-weight:bold; color:var(--text);">${topHomos.map(f => getAvatar(f) + ' ' + f.name).join(', ')} (${maxHits} מכות)</div>
        </div>
        ${chart}
      </div>
    `;
  }

  // Interactive mode block
  let interactiveBlock = '';
  const curMode = sess.currentMode || 'normal';
  const curModeDef = GAME_MODES[curMode] || GAME_MODES.normal;
  const canRoll = !sess.currentGameStarted;
  if (sess.interactiveMode) {
    let modeBox = `
      <div id="mode-display">
        <div style="padding:12px;border-radius:10px;border:2px solid ${curModeDef.color};background:${curModeDef.color}20;text-align:center;">

          <div style="font-size:1.6rem;">${curModeDef.emoji}</div>
          <div style="font-size:0.95rem;font-weight:700;color:${curModeDef.color};">${curModeDef.name}</div>
          <div style="font-size:0.72rem;color:var(--text);margin-top:4px;">${curModeDef.desc}</div>
          ${curMode === 'hunted' && sess.currentHuntedId ? `
            <div style="margin-top:6px;font-size:0.85rem;font-weight:700;color:#ffb84d;">
              🎯 הניצוד: ${getAvatar(sess.fighters.find(f => f.id === sess.currentHuntedId))} ${sess.fighters.find(f => f.id === sess.currentHuntedId)?.name || ''}
            </div>
          ` : ''}
        </div>
      </div>
    `;
    interactiveBlock = `
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">
        ${modeBox}
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" style="flex:1;" onclick="rollNextMode()" ${canRoll ? '' : 'disabled'}>🎲 הגרל מוד למשחק הבא</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleInteractiveMode()" title="כבה מוד אינטראקטיבי">⏻</button>
        </div>
      </div>
    `;
  } else {
    interactiveBlock = `
      <div style="margin-top:10px;">
        <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="toggleInteractiveMode()">🎲 הפעל מוד אינטראקטיבי</button>
      </div>
    `;
  }

  el.innerHTML = `
    ${sessionsList}
    <div style="margin-bottom:10px;">
      <div class="session-time">התחיל: ${start} | ${games} משחקים</div>
    </div>
    ${homoBadge}
    ${interactiveBlock}
  `;
  if (endPanel && endArea) {
    endPanel.classList.remove('hidden');
    endArea.innerHTML = `
      <div class="session-control">
        <button class="btn btn-danger btn-sm" style="width:100%" onclick="endSession()">🏁 סיים וארכב סשן פעיל</button>
      </div>
    `;
  }
}

// ==================== SESSION OVERLAY ====================
function openSessionOverlay() {
  if (!state.fighters.length) { toast('הוסף לוחמים תחילה!'); return; }
  const grid = document.getElementById('session-fighter-grid');
  grid.innerHTML = state.fighters.map(f => `
    <div class="fighter-select-card" data-id="${f.id}" onclick="toggleSessionFighter(${f.id})">
      <div class="card-avatar">${getAvatar(f)}</div>
      <div class="card-name">${f.name}</div>
    </div>
  `).join('');
  document.getElementById('session-overlay').classList.remove('hidden');
}

function closeSessionOverlay() {
  document.getElementById('session-overlay').classList.add('hidden');
}

function toggleSessionFighter(id) {
  const card = document.querySelector(`#session-fighter-grid .fighter-select-card[data-id="${id}"]`);
  card.classList.toggle('selected');
}

function confirmSessionStart() {
  const selected = [...document.querySelectorAll('#session-fighter-grid .fighter-select-card.selected')];
  if (selected.length < 2) { toast('בחר לפחות 2 לוחמים!'); return; }
  const ids = selected.map(c => parseInt(c.dataset.id));
  const fighters = ids.map(id => state.fighters.find(f => f.id === id));

  const interactive = !!document.getElementById('session-interactive-toggle')?.checked;
  const newSession = {
    id: Date.now(),
    startTime: Date.now(),
    endTime: null,
    fighters: fighters.map(f => ({ ...f })),
    games: [],
    scores: {},
    currentGameStarted: false,
    currentGameFighters: fighters.map(f => ({ ...f })),
    currentPlacements: {},
    currentFirstHitId: null,
    interactiveMode: interactive,
    currentMode: 'normal',
    currentHuntedId: null,
    currentKnockouts: {}
  };
  fighters.forEach(f => newSession.scores[f.id] = 0);

  state.sessions.push(newSession);
  state.activeSessionId = newSession.id;

  closeSessionOverlay();
  save();
  renderAll();
  toast('סשן חדש התחיל! ⚔️${W}');
}

function archiveCurrentSession() {
  const s = state.session;
  if (!s) return;
  s.endTime = Date.now();
  state.archive.unshift({ ...s });
  state.sessions = state.sessions.filter(x => x.id !== s.id);
  state.activeSessionId = state.sessions[0]?.id || null;
}

function endSession() {
  confirm2('סיים סשן', 'האם לסיים את הסשן הנוכחי ולארכב אותו?', () => {
    archiveCurrentSession();
    save();
    renderAll();
    toast('הסשן אורכב! 🏁');
  });
}

// ==================== GAME AREA ====================
function renderGameArea() {
  const el = document.getElementById('game-area');
  if (!state.session) {
    el.innerHTML = `
      <div class="no-session-panel">
        <div class="big-walnut">${W}</div>
        <h3>אין סשן פעיל</h3>
        <p style="color:var(--text3);font-size:0.85rem">התחל סשן חדש כדי לשחק!</p>
        <button class="btn btn-primary" onclick="openSessionOverlay()">⚔️ התחל סשן</button>
      </div>
    `;
    return;
  }

  const sess = state.session;
  const gameNum = sess.games.length + 1;
  const placedCount = Object.keys(sess.currentPlacements).length;
  const totalFighters = sess.currentGameFighters.length;
  const nextPlace = placedCount + 1;
  const allPlaced = placedCount >= Math.min(totalFighters, 4);
  const firstHitId = sess.currentFirstHitId;
  const readyToSave = allPlaced && !!firstHitId;

  const curMode = sess.currentMode || 'normal';
  const curModeDef = GAME_MODES[curMode] || GAME_MODES.normal;
  const isSpecial = SPECIAL_MODE_IDS.includes(curMode);

  let html = `
    <div class="panel-title">🎮 משחק #${gameNum}</div>
  `;

  if (isSpecial && sess.currentGameStarted) {
    html += `
      <div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;border:1px solid ${curModeDef.color}80;background:${curModeDef.color}18;display:flex;align-items:center;gap:8px;">
        <div style="font-size:1.4rem;">${curModeDef.emoji}</div>
        <div style="flex:1;">
          <div style="font-size:0.9rem;font-weight:700;color:${curModeDef.color};">${curModeDef.name}</div>
          <div style="font-size:0.72rem;color:var(--text3);">${curModeDef.desc}</div>
        </div>
      </div>
    `;
  }

  // Pre-game: minimal hint (start button is in leaderboard header)
  if (!sess.currentGameStarted) {
    html += `
      <div class="no-session-msg" style="font-size:0.85rem;">
        לחץ על "▶️ התחל משחק" בלוח התהילה כדי להתחיל משחק חדש
      </div>
    `;
  }

  if (sess.currentGameStarted) {
    html += `<div class="game-number-tag">GAME ${gameNum} · בחר סדר סיום</div>`;

    if (!allPlaced) {
      html += `<div class="next-place-hint">לחץ על הלוחם שסיים במקום ${nextPlace}</div>`;
    }

    html += `<div class="placement-zone">`;
    html += sess.currentGameFighters.map(f => {
      const place = sess.currentPlacements[f.id];
      let cardClass = 'fighter-card';
      let badgeHtml = '';
      let labelHtml = '';
      let firstHitHtml = '';
      if (place) {
        cardClass += ` placed card-place-${place}`;
        badgeHtml = `<div class="card-place-badge place-${place}">${place}</div>`;
        labelHtml = `<div class="placement-label place-label-${place}">${placeLabels[place]}</div>`;
      } else if (!allPlaced) {
        cardClass += ' available pulse-available';
      }
      if (firstHitId === f.id) {
        cardClass += ' first-hit';
        firstHitHtml = `<div class="first-hit-label">הומו המשחק</div>`;
      }
      const nuts = place ? state.scoring[place] : '';
      return `
        <div class="${cardClass}" onclick="handleGameFighterClick(${f.id})">
          ${badgeHtml}
          <span class="fc-avatar">${getAvatar(f)}</span>
          <div class="fc-name">${f.name}</div>
          ${place ? `<div class="fc-pts">+${nuts} ${W}</div>` : ''}
          ${labelHtml}
          ${firstHitHtml}
        </div>
      `;
    }).join('');
    html += `</div>`;

    if (allPlaced) {
      html += `
        <div class="first-hit-section">
          <div class="first-hit-title">בחר מי הוא הומו המשחק?</div>
          <div class="first-hit-picker">
            ${sess.currentGameFighters.map(f => `
              <button type="button" class="first-hit-option ${firstHitId === f.id ? 'selected' : ''}" onclick="selectFirstHit(${f.id})">
                ${getAvatar(f)} ${f.name}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    // Knockout counts step (after placements + firstHit selected, only for special modes)
    let knockoutsReady = true;
    if (isSpecial && allPlaced && firstHitId) {
      const ko = sess.currentKnockouts || {};
      const total = sess.currentGameFighters.reduce((acc, f) => acc + (ko[f.id] || 0), 0);
      knockoutsReady = total > 0;
      let trackedId = null;
      if (curMode === 'palestine') trackedId = sess.currentFirstHitId;
      else if (curMode === 'hunted') trackedId = sess.currentHuntedId;
      else if (curMode === 'kingslayer') trackedId = getSessionLeaderId(sess);
      else if (curMode === 'underdog') trackedId = getSessionLastId(sess);

      const trackedFighter = trackedId ? sess.fighters.find(x => x.id === trackedId) : null;
      const heading = curMode === 'underdog'
        ? `כמה נוקאאוטים עשה האנדרדוג?`
        : `כמה נוקאאוטים עשה כל לוחם על ${trackedFighter ? getAvatar(trackedFighter) + ' ' + trackedFighter.name : 'היעד'}?`;

      html += `
        <div style="margin-top:14px;padding:12px;border-radius:10px;border:1px solid ${curModeDef.color}60;background:${curModeDef.color}10;">
          <div style="font-size:0.85rem;font-weight:700;color:${curModeDef.color};margin-bottom:8px;text-align:center;">
            ${curModeDef.emoji} ${heading}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
            ${(curMode === 'underdog' && trackedFighter ? [trackedFighter] : sess.currentGameFighters).map(f => `
              <div style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);">
                <span style="font-size:1.1rem;">${getAvatar(f)}</span>
                <span style="font-size:0.8rem;">${f.name}</span>
                <input type="number" min="0" value="${(sess.currentKnockouts || {})[f.id] || 0}"
                  onchange="setKnockoutCount(${f.id}, this.value)"
                  style="width:50px;text-align:center;font-weight:700;" />
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    const fullyReady = readyToSave && (!isSpecial || knockoutsReady);

    html += `<div class="game-btn-row">`;
    if (fullyReady) {
      html += `<button class="btn btn-success" onclick="saveGame()">💾 שמור משחק</button>`;
    } else if (allPlaced && !firstHitId) {
      html += `<div class="save-requirement">בחר הומו כדי להמשיך</div>`;
    } else if (isSpecial && readyToSave && !knockoutsReady) {
      html += `<div class="save-requirement">הזן כמות נוקאאוטים</div>`;
    }
    html += `<button class="btn btn-ghost btn-sm" onclick="resetPlacements()">🔄 אפס</button>`;
    html += `</div>`;
  }

  el.innerHTML = html;
}

function startCurrentGame() {
  const sess = state.session;
  if (!sess) return;
  if (sess.currentGameFighters.length < 2) { toast('בחר לפחות 2 לוחמים!'); return; }
  sess.currentGameStarted = true;
  sess.currentPlacements = {};
  sess.currentFirstHitId = null;
  sess.currentKnockouts = {};
  save();
  renderAll();
}

function handleGameFighterClick(fid) {
  const sess = state.session;
  if (!sess) return;
  const placed = Object.keys(sess.currentPlacements).length;
  const maxPlace = Math.min(sess.currentGameFighters.length, 4);
  if (placed >= maxPlace) {
    selectFirstHit(fid);
  } else {
    assignPlacement(fid);
  }
}

function assignPlacement(fid) {
  const sess = state.session;
  if (!sess) return;
  if (sess.currentPlacements[fid]) return;
  const placed = Object.keys(sess.currentPlacements).length;
  const maxPlace = Math.min(sess.currentGameFighters.length, 4);
  if (placed >= maxPlace) return;
  sess.currentPlacements[fid] = placed + 1;
  save();
  renderGameArea();
}

function selectFirstHit(fid) {
  const sess = state.session;
  if (!sess) return;
  if (!sess.currentGameFighters.find(f => f.id === fid)) return;
  sess.currentFirstHitId = fid;
  save();
  renderGameArea();
}

function resetPlacements() {
  const sess = state.session;
  if (!sess) return;
  sess.currentPlacements = {};
  sess.currentFirstHitId = null;
  sess.currentKnockouts = {};
  save();
  renderGameArea();
}

function saveGame() {
  const sess = state.session;
  if (!sess) return;
  const placements = { ...sess.currentPlacements };
  const fighters = [...sess.currentGameFighters];
  const requiredPlacements = Math.min(fighters.length, 4);

  if (Object.keys(placements).length < requiredPlacements) {
    toast('בחר דירוג סיום לפני השמירה');
    return;
  }
  if (!sess.currentFirstHitId) {
    toast('בחר הומו המשחק לפני השמירה');
    return;
  }

  const mode = sess.currentMode || 'normal';
  if (modeRequiresKnockouts(mode)) {
    const ko = sess.currentKnockouts || {};
    const total = sess.currentGameFighters.reduce((acc, f) => acc + (ko[f.id] || 0), 0);
    if (total <= 0) {
      toast('הזן כמות נוקאאוטים לפני שמירה');
      return;
    }
  }

  const game = {
    id: Date.now(),
    fighters: fighters.map(f => f.id),
    placements,
    firstHitId: sess.currentFirstHitId,
    mode,
    huntedId: mode === 'hunted' ? sess.currentHuntedId : null,
    leaderId: mode === 'kingslayer' ? getSessionLeaderId(sess) : null,
    lastId: mode === 'underdog' ? getSessionLastId(sess) : null,
    knockouts: modeRequiresKnockouts(mode) ? { ...(sess.currentKnockouts || {}) } : {},
    timestamp: Date.now()
  };

  sess.games.push(game);

  Object.entries(placements).forEach(([fid, place]) => {
    const id = parseInt(fid);
    if (!sess.scores[id]) sess.scores[id] = 0;
    sess.scores[id] += state.scoring[place] || 0;
  });

  // Apply mode bonus
  const bonus = computeModeBonus(sess, game);
  Object.entries(bonus).forEach(([fid, pts]) => {
    const id = parseInt(fid);
    if (!pts) return;
    if (!sess.scores[id]) sess.scores[id] = 0;
    sess.scores[id] += pts;
  });

  sess.currentGameStarted = false;
  sess.currentPlacements = {};
  sess.currentFirstHitId = null;
  sess.currentGameFighters = [...sess.fighters];
  sess.currentMode = 'normal';
  sess.currentHuntedId = null;
  sess.currentKnockouts = {};

  save();
  renderAll();
  toast('משחק נשמר! ${W}');
}

// ==================== LEADERBOARD ====================
function renderLeaderboard() {
  const el = document.getElementById('leaderboard');
  const actionsEl = document.getElementById('leaderboard-actions');
  if (actionsEl) {
    if (state.session && !state.session.currentGameStarted && state.session.fighters.length >= 2) {
      actionsEl.innerHTML = `<button class="btn btn-primary btn-sm" onclick="startCurrentGame()">▶️ התחל משחק</button>`;
    } else {
      actionsEl.innerHTML = '';
    }
  }
  if (!state.session) {
    el.innerHTML = `<div class="no-session-msg" style="font-size:0.8rem">התחל סשן כדי לראות דירוג</div>`;
    return;
  }

  const fighters = state.session.fighters.map(f => ({
    ...f,
    nuts: state.session.scores[f.id] || 0
  })).sort((a, b) => b.nuts - a.nuts);

  if (!fighters.length) {
    el.innerHTML = `<div class="no-session-msg">אין לוחמים בסשן</div>`;
    return;
  }

  const maxNuts = fighters[0].nuts;

  el.innerHTML = fighters.map((f, i) => {
    const rank = i + 1;
    const isFirst = rank === 1;
    const isLast = rank === fighters.length && fighters.length > 1;
    let itemClass = 'lb-item';
    let titleTag = '';

    if (isFirst && maxNuts > 0) {
      itemClass += ' lb-first';
      titleTag = `<div class="lb-title-tag">👑 אלוף האלופים</div>`;
    } else if (isLast && fighters.length > 1) {
      itemClass += ' lb-last';
      titleTag = `<div class="lb-title-tag">💩 זבל הזבלים</div>`;
    }

    const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}`;

    return `
      <div class="${itemClass}">
        <div class="lb-rank">${rankEmoji}</div>
        <div class="lb-avatar">${getAvatar(f)}</div>
        <div class="lb-info">
          <div class="lb-name">${f.name}</div>
          ${titleTag}
        </div>
        <div class="lb-nuts">
          <div class="lb-nuts-count">${f.nuts}</div>
          <div class="lb-walnut">${W}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ==================== FIRST HIT LEADERBOARD ====================
function renderFirstHitLeaderboard() {
  const el = document.getElementById('first-hit-leaderboard');
  if (!el) return;
  if (!state.session) {
    el.innerHTML = `<div class="no-session-msg" style="font-size:0.8rem">התחל סשן כדי לראות דירוג</div>`;
    return;
  }

  const firstHitCounts = {};
  state.session.fighters.forEach(f => firstHitCounts[f.id] = 0);
  state.session.games.forEach(g => {
    if (g.firstHitId) {
      firstHitCounts[g.firstHitId] = (firstHitCounts[g.firstHitId] || 0) + 1;
    }
  });

  const fighters = state.session.fighters.map(f => ({
    ...f,
    firstHits: firstHitCounts[f.id] || 0
  })).sort((a, b) => b.firstHits - a.firstHits);

  if (!fighters.length || fighters[0].firstHits === 0) {
    el.innerHTML = `<div class="no-session-msg">אין נתונים עדיין</div>`;
    return;
  }

  const maxHits = fighters[0].firstHits;

  el.innerHTML = fighters.filter(f => f.firstHits > 0).map((f, i) => {
    const rank = i + 1;
    const isFirst = f.firstHits === maxHits;
    let itemClass = 'lb-item';
    
    return `
      <div class="${itemClass}" ${isFirst ? 'style="border-color:#ff5ac8;background:linear-gradient(135deg, #ff5ac815, var(--dark3));box-shadow:0 0 15px #ff5ac830;"' : ''}>
        <div class="lb-rank" ${isFirst ? 'style="color:#ff8cda"' : ''}>${rank}</div>
        <div class="lb-avatar">${getAvatar(f)}</div>
        <div class="lb-info">
          <div class="lb-name">${f.name}</div>
          ${isFirst ? `<div class="lb-title-tag" style="color:#ff8cda;font-weight:bold;">💖 הומו ההומאים</div>` : ''}
        </div>
        <div class="lb-nuts">
          <div class="lb-nuts-count" ${isFirst ? 'style="color:#ff8cda"' : ''}>${f.firstHits}</div>
          <div style="font-size:1.1rem; color:#ff8cda; filter:drop-shadow(0 0 4px #ff5ac880)">♥</div>
        </div>
      </div>
    `;
  }).join('');
}

// ==================== GAME HISTORY ====================
function renderGameHistory() {
  const el = document.getElementById('game-history');
  if (!state.session || !state.session.games.length) {
    el.innerHTML = `<div class="no-session-msg" style="font-size:0.8rem">אין משחקים עדיין</div>`;
    return;
  }

  el.innerHTML = [...state.session.games].reverse().map((game, i) => {
    const num = state.session.games.length - i;
    const sortedPlacements = Object.entries(game.placements).sort((a, b) => a[1] - b[1]);
    const chips = sortedPlacements.map(([fid, place]) => {
      const f = state.session.fighters.find(x => x.id === parseInt(fid));
      if (!f) return '';
      return `<span class="place-chip chip-${place}">${place}. ${getAvatar(f)} ${f.name}</span>`;
    }).join('');
    const firstHit = game.firstHitId ? state.session.fighters.find(x => x.id === parseInt(game.firstHitId)) : null;
    const firstHitChip = firstHit
      ? `<span class="first-hit-chip">הומו: ${getAvatar(firstHit)} ${firstHit.name}</span>`
      : '';

    return `
      <div class="game-hist-item">
        <div class="gh-header">
          <span>משחק #${num}</span>
          <span>${fmtTime(game.timestamp)}</span>
        </div>
        <div class="game-hist-placements">${chips}${firstHitChip}</div>
      </div>
    `;
  }).join('');
}

// ==================== ARCHIVE ====================
function renderArchive() {
  const listEl = document.getElementById('archive-list');
  const noEl = document.getElementById('no-archive');

  if (!state.archive.length) {
    listEl.innerHTML = '';
    noEl.style.display = '';
    return;
  }
  noEl.style.display = 'none';

  listEl.innerHTML = state.archive.map((sess, i) => {
    const num = state.archive.length - i;
    const winner = (() => {
      const scores = sess.fighters.map(f => ({ ...f, nuts: sess.scores[f.id] || 0 })).sort((a, b) => b.nuts - a.nuts);
      return scores[0];
    })();

    return `
      <div class="archive-item" onclick="toggleArchiveDetail(${sess.id})">
        <div class="archive-header">
          <div class="archive-num">סשן #${num}</div>
          <div class="archive-time">${fmtDate(sess.startTime)} ${fmtTime(sess.startTime)} → ${fmtTime(sess.endTime)}</div>
        </div>
        <div class="archive-stats">
          <span>🎮 ${sess.games.length} משחקים</span>
          <span>👥 ${sess.fighters.length} לוחמים</span>
          ${winner ? `<span class="archive-winner">🏆 ${getAvatar(winner)} ${winner.name} (${winner.nuts}${W})</span>` : ''}
        </div>
        <div class="archive-detail" id="arch-detail-${sess.id}">
          <div style="font-size:0.8rem;color:var(--text2);margin-bottom:6px;">דירוג סופי:</div>
          ${sess.fighters.map(f => ({ ...f, nuts: sess.scores[f.id] || 0 }))
            .sort((a, b) => b.nuts - a.nuts)
            .map((f, ri) => `
              <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.82rem;">
                <span>${ri === 0 ? '🥇' : ri === 1 ? '🥈' : ri === 2 ? '🥉' : `${ri+1}.`}</span>
                <span>${getAvatar(f)}</span>
                <span style="flex:1">${f.name}</span>
                <span style="color:var(--gold);font-weight:700">${f.nuts} ${W}</span>
              </div>
            `).join('')}
          ${sess.games.some(game => game.firstHitId) ? (() => {
            const counts = {};
            sess.games.forEach(game => {
              if (game.firstHitId) counts[game.firstHitId] = (counts[game.firstHitId] || 0) + 1;
            });
            const rows = Object.entries(counts)
              .map(([fid, c]) => ({ f: sess.fighters.find(x => x.id === parseInt(fid)), c }))
              .filter(r => r.f)
              .sort((a, b) => b.c - a.c);
            const chart = homoCandleChart(sess.fighters, counts);
            return `
              <div style="font-size:0.8rem;color:var(--text2);margin:10px 0 6px;">הומו ההומואים:</div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="flex:1; min-width:0;">
                  ${rows.map(r => `
                    <div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:0.82rem;">
                      <span class="first-hit-chip">${getAvatar(r.f)} ${r.f.name} (${r.c})</span>
                    </div>
                  `).join('')}
                </div>
                ${chart}
              </div>
            `;
          })() : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleArchiveDetail(id) {
  const el = document.getElementById(`arch-detail-${id}`);
  if (el) el.classList.toggle('open');
}

// ==================== RENDER ALL ====================
function renderAll() {
  renderFighterPool();
  renderScoring();
  renderSessionControl();
  renderGameArea();
  renderLeaderboard();
  renderFirstHitLeaderboard();
  renderGameHistory();
  renderArchive();
}

// ==================== INIT ====================
load();
renderAll();
</script>
